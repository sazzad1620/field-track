name: field_track
description: Field tracking app for Progressive Byte Flutter assessment.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  dio: ^5.7.0
  get_it: ^8.0.3
  go_router: ^14.8.1
  flutter_secure_storage: ^9.2.4
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28
  connectivity_plus: ^6.1.4
  path: ^1.9.1
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true
